<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Lookup | Redz Hub</title>
    <style>
        :root {
            --discord-color: #5865F2;
            --bg-dark: #090909;
            --card-bg: #121212;
            --text-gray: #b9bbbe;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            width: 90%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #1f1f1f;
        }

        h1 { color: var(--discord-color); margin-bottom: 10px; font-size: 24px; }
        .tagline { color: var(--text-gray); font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: white;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            transition: 0.3s;
        }

        input:focus { border-color: var(--discord-color); }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary { background-color: var(--discord-color); color: white; }
        .btn-primary:hover { background-color: #4752c4; transform: translateY(-2px); }

        .btn-join { background-color: #23a559; color: white; margin-top: 20px; }
        .btn-join:hover { background-color: #1a7a42; }

        #result {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #181818;
            border-radius: 15px;
            text-align: right;
            border: 1px solid #222;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
            border: 4px solid var(--discord-color);
        }

        .info-row { margin-bottom: 10px; font-size: 14px; border-bottom: 1px solid #252525; padding-bottom: 5px; }
        .info-row span { color: var(--discord-color); font-weight: bold; }

        .footer { margin-top: 20px; font-size: 12px; color: #444; }
    </style>
</head>
<body>

    <div class="container">
        <h1>كاشف ديسكورد</h1>
        <p class="tagline">استخرج معلومات أي حساب عبر الآيدي (ID)</p>

        <input type="text" id="userId" placeholder="ضع آيدي (ID) الشخص هنا...">
        <button class="btn btn-primary" onclick="lookup()">بدء الكشف الآن</button>

        <div id="result">
            <img id="res-avatar" class="avatar" src="" alt="Avatar">
            <div class="info-row">الاسم: <span id="res-name"></span></div>
            <div class="info-row">اليوزر: <span id="res-user"></span></div>
            <div class="info-row">الآيدي: <span id="res-id"></span></div>
            <div class="info-row">تاريخ الإنشاء: <span id="res-date"></span></div>
            <div class="info-row">تاريخ التحديث: <span id="res-update">الآن</span></div>
        </div>

        <button class="btn btn-join" onclick="copyAndGo()">نسخ الرابط ودخول سيرفرنا</button>
        
        <div class="footer">By: Zero (Redz Hub)</div>
    </div>

    <script>
        async function lookup() {
            const id = document.getElementById('userId').value;
            if(!id) return alert("الرجاء إدخال الآيدي!");

            try {
                const response = await fetch(`https://discordlookup.mesalytic.moe/v1/user/${id}`);
                const data = await response.json();

                if(data.id) {
                    document.getElementById('res-avatar').src = data.avatar.link;
                    document.getElementById('res-name').innerText = data.global_name || "غير محدد";
                    document.getElementById('res-user').innerText = data.username;
                    document.getElementById('res-id').innerText = data.id;
                    
                    // تحويل Snowflake ID إلى تاريخ إنشاء
                    const createdAt = new Date(Number((BigInt(id) >> 22n) + 1420070400000n));
                    document.getElementById('res-date').innerText = createdAt.toLocaleDateString('ar-SA');

                    document.getElementById('result').style.display = 'block';
                } else {
                    alert("آيدي غير صحيح أو الحساب غير متاح");
                }
            } catch (err) {
                alert("فشل جلب البيانات، تأكد من الآيدي");
            }
        }

        function copyAndGo() {
            const link = "https://discord.gg/WmshaF5szk";
            navigator.clipboard.writeText(link).then(() => {
                alert("تم نسخ الرابط بنجاح! سيتم توجيهك للسيرفر.");
                window.location.href = link;
            });
        }
    </script>
</body>
</html>
