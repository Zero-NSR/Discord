<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redz Decoder Pro | V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

        :root {
            --neon: #00ff41;
            --discord: #5865F2;
            --bg-main: #08080a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-main);
            color: white;
            font-family: 'Space Mono', monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تأثير الخلفية المتحركة */
        .bg-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 65, 0.2);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px rgba(0, 255, 65, 0.05);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header { margin-bottom: 25px; }
        .header h1 { color: var(--neon); font-size: 22px; text-shadow: 0 0 10px var(--neon); margin: 0; }
        .header p { color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        .input-group { position: relative; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 12px;
            color: var(--neon);
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 15px rgba(0, 255, 65, 0.2); }

        .scan-btn {
            width: 100%;
            padding: 15px;
            background: var(--neon);
            color: black;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }
        .scan-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--neon); }

        /* منطقة النتائج */
        #results { display: none; margin-top: 30px; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--neon); padding: 3px; }
        .u-info-top { text-align: right; }
        .u-name { font-size: 18px; font-weight: bold; color: white; display: block; }
        .u-id-sub { font-size: 11px; color: #666; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .info-card {
            background: rgba(0,0,0,0.3);
            border: 1px solid #222;
            padding: 12px;
            border-radius: 10px;
            text-align: right;
        }
        .info-card i { color: var(--neon); font-size: 12px; margin-bottom: 5px; }
        .info-card label { display: block; font-size: 9px; color: #777; text-transform: uppercase; }
        .info-card span { font-size: 12px; color: #ddd; font-weight: bold; }

        .footer { margin-top: 30px; border-top: 1px dotted #333; padding-top: 15px; font-size: 10px; }
        .footer a { color: var(--discord); text-decoration: none; }
    </style>
</head>
<body>

    <div class="bg-effect"></div>

    <div class="container">
        <div class="header">
            <h1>REDZ DECODER <span style="font-size: 12px;">v2.0</span></h1>
            <p>Advanced Discord OSINT Tool</p>
        </div>

        <div class="input-group">
            <input type="text" id="targetId" placeholder="أدخل آيدي الحساب..." autocomplete="off">
        </div>

        <button class="scan-btn" onclick="decodeId()">
            <i class="fas fa-microchip"></i> تشغيل الفحص العميق
        </button>

        <div id="results">
            <div class="profile-header">
                <img id="avatar" class="avatar" src="https://archive.org/download/discord_default_avatars/blue.png">
                <div class="u-info-top">
                    <span id="name" class="u-name">Unknown User</span>
                    <span id="id_text" class="u-id-sub"></span>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <i class="fas fa-calendar-alt"></i>
                    <label>تاريخ الإنشاء</label>
                    <span id="date">--</span>
                </div>
                <div class="info-card">
                    <i class="fas fa-hourglass-half"></i>
                    <label>عمر الحساب</label>
                    <span id="age">--</span>
                </div>
                <div class="info-card">
                    <i class="fas fa-clock"></i>
                    <label>توقيت التسجيل</label>
                    <span id="time">--</span>
                </div>
                <div class="info-card">
                    <i class="fas fa-star"></i>
                    <label>البرج الفلكي</label>
                    <span id="zodiac">--</span>
                </div>
            </div>

            <div class="info-card" style="margin-top:10px; width:100%; box-sizing:border-box;">
                <i class="fas fa-shield-alt"></i>
                <label>حالة التوثيق (Verification)</label>
                <span id="status" style="color:var(--neon)">SYSTEM_VERIFIED ✓</span>
            </div>
        </div>

        <div class="footer">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <a href="https://discord.gg/WmshaF5szk"><i class="fab fa-discord"></i> Join Redz Server</a>
                <span style="color:#444">BY: ZERO-REDZ</span>
            </div>
        </div>
    </div>

    <script>
        function decodeId() {
            const id = document.getElementById('targetId').value.trim();
            if(!id || isNaN(id)) return alert("Invalid ID Input!");

            // نظام فك التشفير الذاتي (Discord Snowflake)
            const epoch = 1420070400000;
            const timestamp = Number((BigInt(id) >> 22n) + BigInt(epoch));
            const dateObj = new Date(timestamp);

            // 1. التاريخ والوقت
            document.getElementById('date').innerText = dateObj.toLocaleDateString('ar-SA');
            document.getElementById('time').innerText = dateObj.toLocaleTimeString('ar-SA');
            document.getElementById('id_text').innerText = "ID: " + id;

            // 2. حساب العمر بالأيام
            const diff = Math.floor((new Date() - dateObj) / (1000 * 60 * 60 * 24));
            document.getElementById('age').innerText = diff + " يوم";

            // 3. البرج الفلكي (Zodiac)
            const zodiac = getZodiac(dateObj.getDate(), dateObj.getMonth() + 1);
            document.getElementById('zodiac').innerText = zodiac;

            // محاولة جلب الصورة (إذا توفر الـ API)
            fetch(`https://discordlookup.mesalytic.moe/v1/user/${id}`)
                .then(r => r.json())
                .then(data => {
                    if(data.username) {
                        document.getElementById('name').innerText = data.global_name || data.username;
                        document.getElementById('avatar').src = data.avatar.link;
                    }
                }).catch(() => {
                    document.getElementById('name').innerText = "Account Found";
                });

            document.getElementById('results').style.display = 'block';
        }

        function getZodiac(day, month) {
            const signs = ["الجدي", "الدلو", "الحوت", "الحمل", "الثور", "الجوزاء", "السرطان", "الأسد", "العذراء", "الميزان", "العقرب", "القوس"];
            const last_day = [19, 18, 20, 19, 20, 20, 22, 22, 22, 22, 21, 21];
            return (day > last_day[month - 1]) ? signs[month % 12] : signs[month - 1];
        }
    </script>
</body>
</html>
