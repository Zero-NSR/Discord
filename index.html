<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Lookup | Redz Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --discord-blurple: #5865F2;
            --discord-green: #23a559;
            --discord-dark: #313338; /* لون خلفية ديسكورد الحقيقي */
            --discord-black: #1e1f22;
        }

        body {
            background-color: var(--discord-black);
            color: #dbdee1;
            font-family: 'gg sans', 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .container {
            background-color: var(--discord-dark);
            padding: 24px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            text-align: center;
        }

        h2 { color: white; font-size: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* حقل الإدخال */
        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #b5bac1; margin-bottom: 8px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: none;
            background: #1e1f22;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 3px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .btn-lookup { background: var(--discord-blurple); color: white; }
        .btn-lookup:hover { background: #4752c4; }
        
        .btn-join { background: var(--discord-green); color: white; margin-top: 20px; }
        .btn-join:hover { background: #1a7a42; }

        /* مربع الملف الشخصي (Profile Card) */
        #profileCard {
            display: none;
            margin-top: 20px;
            background: var(--discord-black);
            border-radius: 8px;
            overflow: hidden;
            text-align: right;
            border: 1px solid #2a2b2e;
        }
        .banner { height: 60px; background: var(--discord-blurple); width: 100%; }
        .p-content { padding: 16px; position: relative; }
        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 6px solid var(--discord-black);
            position: absolute;
            top: -35px;
            right: 15px;
            background: #313338;
        }
        .user-info { margin-top: 35px; }
        .u-name { color: white; font-size: 18px; font-weight: bold; display: block; }
        .u-tag { color: #b5bac1; font-size: 13px; margin-bottom: 15px; display: block; }
        
        .data-section { border-top: 1px solid #3f4147; padding-top: 10px; margin-top: 10px; }
        .data-item { font-size: 12px; margin-bottom: 5px; color: #dbdee1; }
        .data-item i { color: #b5bac1; width: 20px; text-align: center; margin-left: 5px; }

        .copy-badge { 
            font-size: 10px; background: #3f4147; padding: 2px 6px; 
            border-radius: 4px; cursor: pointer; float: left; 
        }
        .copy-badge:hover { background: #4e5058; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <h2><i class="fab fa-discord"></i> Discord Tracker</h2>
        
        <div class="input-group">
            <label>معرف المستخدم (USER ID)</label>
            <input type="text" id="targetId" placeholder="مثال: 1297078220373364809">
        </div>
        
        <button class="btn btn-lookup" onclick="getDiscordData()">
            <i class="fas fa-search"></i> كشف البيانات
        </button>

        <div id="profileCard">
            <div class="banner"></div>
            <div class="p-content">
                <img id="uAvatar" class="avatar" src="">
                <div class="user-info">
                    <span id="uName" class="u-name"></span>
                    <span id="uUser" class="u-tag"></span>
                    
                    <div class="data-section">
                        <div class="data-item">
                            <i class="fas fa-calendar-plus"></i> تاريخ الإنشاء: <span id="uDate"></span>
                        </div>
                        <div class="data-item">
                            <i class="fas fa-fingerprint"></i> الآيدي: <span id="uId"></span>
                            <span class="copy-badge" onclick="copyValue('uId')">نسخ</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btn-join" onclick="joinAndCopy()">
            <i class="fab fa-discord"></i> دخول سيرفر Redz
        </button>
    </div>

    <script>
        async function getDiscordData() {
            const id = document.getElementById('targetId').value.trim();
            if(!id) return;

            try {
                const res = await fetch(`https://discordlookup.mesalytic.moe/v1/user/${id}`);
                const data = await res.json();

                if(data.id) {
                    document.getElementById('uAvatar').src = data.avatar.link;
                    document.getElementById('uName').innerText = data.global_name || data.username;
                    document.getElementById('uUser').innerText = "@" + data.username;
                    document.getElementById('uId').innerText = data.id;
                    
                    // حساب التاريخ من الآيدي
                    const created = new Date(Number((BigInt(id) >> 22n) + 1420070400000n));
                    document.getElementById('uDate').innerText = created.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });

                    document.getElementById('profileCard').style.display = 'block';
                } else {
                    alert("آيدي غير موجود");
                }
            } catch (e) {
                alert("حدث خطأ أثناء جلب البيانات");
            }
        }

        function copyValue(id) {
            const val = document.getElementById(id).innerText;
            navigator.clipboard.writeText(val);
            alert("تم النسخ!");
        }

        function joinAndCopy() {
            const link = "https://discord.gg/WmshaF5szk";
            navigator.clipboard.writeText(link);
            alert("تم نسخ الرابط! جاري تحويلك لسيرفرنا.");
            window.location.href = link;
        }
    </script>
</body>
</html>
