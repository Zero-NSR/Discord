<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redz System - Discord Decoder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #5865F2; --bg: #0b0b0b; --card: #18191c; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .system-box { background: var(--card); width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #444; background: #000; color: #00ff00; font-family: monospace; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; text-align: center; }
        .btn-scan { width: 100%; padding: 15px; background: var(--main); border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        #output { display: none; margin-top: 20px; text-align: right; background: #000; padding: 15px; border-radius: 10px; border: 1px solid #00ff0033; font-family: monospace; }
        .line { margin-bottom: 10px; font-size: 13px; color: #00ff00; border-bottom: 1px solid #111; padding-bottom: 5px; }
        .label { color: #888; margin-left: 5px; }
        .u-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #00ff00; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="system-box">
        <h2 style="color: #00ff00; font-family: monospace;">[ REDZ_DECODER_V1 ]</h2>
        <input type="text" id="rawId" placeholder="ENTER_USER_ID">
        <button class="btn-scan" onclick="startSystem()">
            <i class="fas fa-terminal"></i> تشغيل السستم
        </button>

        <div id="output">
            <img id="pfp" class="u-img" src="https://archive.org/download/discord_default_avatars/blue.png">
            <div class="line"><span class="label">> الحساب:</span> <span id="res_user">جاري البحث...</span></div>
            <div class="line"><span class="label">> تاريخ الإنشاء:</span> <span id="res_date"></span></div>
            <div class="line"><span class="label">> العمر التقريبي:</span> <span id="res_age"></span></div>
            <div class="line"><span class="label">> الآيدي:</span> <span id="res_id"></span></div>
            <div class="line"><span class="label">> الحالة:</span> <span style="color: #00ff00;">مؤكد (Verified)</span></div>
        </div>

        <a href="https://discord.gg/WmshaF5szk" style="color: #5865F2; text-decoration: none; font-size: 12px; display: block; margin-top: 20px;">Join Redz Server</a>
    </div>

    <script>
        function startSystem() {
            const id = document.getElementById('rawId').value.trim();
            if(!id || isNaN(id)) return alert("أدخل آيدي صحيح!");

            // --- السستم الذاتي لاستخراج التاريخ (بدون انترنت) ---
            const DISCORD_EPOCH = 1420070400000;
            const timestamp = Number((BigInt(id) >> 22n) + BigInt(DISCORD_EPOCH));
            const date = new Date(timestamp);
            
            // حساب العمر
            const now = new Date();
            const ageDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));

            // عرض البيانات
            document.getElementById('res_date').innerText = date.toLocaleDateString('ar-SA') + " | " + date.toLocaleTimeString('ar-SA');
            document.getElementById('res_age').innerText = ageDays + " يوم";
            document.getElementById('res_id').innerText = id;

            // محاولة جلب الصورة والاسم (يحتاج انترنت)
            fetch(`https://discordlookup.mesalytic.moe/v1/user/${id}`)
                .then(r => r.json())
                .then(data => {
                    if(data.username) {
                        document.getElementById('res_user').innerText = data.global_name || data.username;
                        document.getElementById('pfp').src = data.avatar.link;
                    }
                })
                .catch(() => {
                    document.getElementById('res_user').innerText = "تم استخراج التاريخ (البيانات الأخرى مخفية)";
                });

            document.getElementById('output').style.display = 'block';
        }
    </script>
</body>
</html>
