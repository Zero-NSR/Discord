<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redz Hub | Discord OSINT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --redz: #ff0000; --bg: #0a0a0a; --card: #151515; --text: #eeeeee; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .main-card { background: var(--card); width: 100%; max-width: 450px; border-radius: 15px; border: 1px solid #222; box-shadow: 0 10px 50px rgba(0,0,0,0.8); overflow: hidden; }
        .banner { height: 90px; background: linear-gradient(45deg, #111, #222); border-bottom: 2px solid var(--redz); }
        .content { padding: 20px; position: relative; }
        
        .avatar-box { position: absolute; top: -50px; right: 20px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 4px solid var(--card); background: #222; object-fit: cover; }
        
        .search-section { margin-top: 40px; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; text-align: center; font-size: 16px; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        input:focus { border-color: var(--redz); }
        
        .btn-exe { width: 100%; padding: 14px; background: var(--redz); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-exe:hover { opacity: 0.8; transform: translateY(-2px); }

        /* منطقة استعراض البيانات */
        #dataPanel { display: none; margin-top: 25px; border-top: 1px solid #222; padding-top: 20px; }
        .user-header { margin-bottom: 20px; text-align: right; }
        .u-name { font-size: 24px; font-weight: bold; color: white; display: block; }
        .u-tag { color: #888; font-size: 14px; }

        .info-list { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .info-row { background: #0d0d0d; padding: 12px; border-radius: 8px; border-right: 3px solid var(--redz); display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .label { color: #666; font-weight: bold; }
        .value { color: #fff; font-family: monospace; }

        .badges-box { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 15px; }
        .badge-tag { background: #222; padding: 4px 10px; border-radius: 5px; font-size: 11px; color: var(--redz); border: 1px solid #333; }

        .footer { margin-top: 25px; text-align: center; font-size: 11px; color: #444; border-top: 1px solid #1a1a1a; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="banner" id="bannerImg"></div>
        <div class="content">
            <div class="avatar-box">
                <img id="pfp" class="avatar" src="https://archive.org/download/discord_default_avatars/blue.png">
            </div>

            <div class="search-section">
                <input type="text" id="userId" placeholder="أدخل الآيدي (User ID)..." autocomplete="off">
                <button class="btn-exe" onclick="extractData()">
                    <i class="fas fa-search-plus"></i> استخراج البيانات الكاملة
                </button>
            </div>

            <div id="dataPanel">
                <div class="user-header">
                    <span id="resName" class="u-name"></span>
                    <span id="resTag" class="u-tag"></span>
                    <div class="badges-box" id="resBadges"></div>
                </div>

                <div class="info-list">
                    <div class="info-row"><span class="label">تاريخ الإنشاء:</span> <span id="resCreated" class="value"></span></div>
                    <div class="info-row"><span class="label">عمر الحساب:</span> <span id="resAge" class="value"></span></div>
                    <div class="info-row"><span class="label">الآيدي الكامل:</span> <span id="resId" class="value"></span></div>
                    <div class="info-row"><span class="label">نوع الحساب:</span> <span id="resType" class="value"></span></div>
                    <div class="info-row"><span class="label">اللقب العام:</span> <span id="resGlobal" class="value"></span></div>
                </div>
            </div>

            <div class="footer">
                REDZ HUB SYSTEM | BY: ZERO-NSR
                <br>
                <a href="https://discord.gg/WmshaF5szk" style="color:var(--redz); text-decoration:none;">Join Community</a>
            </div>
        </div>
    </div>

    <script>
        async function extractData() {
            const id = document.getElementById('userId').value.trim();
            if(!id || isNaN(id)) return alert("الرجاء إدخال آيدي صحيح!");

            const panel = document.getElementById('dataPanel');
            panel.style.display = 'none';

            try {
                // سستم فك التشفير الذاتي للتاريخ (مضمون 100%)
                const epoch = 1420070400000;
                const timestamp = Number((BigInt(id) >> 22n) + BigInt(epoch));
                const date = new Date(timestamp);
                const ageDays = Math.floor((new Date() - date) / (1000 * 60 * 60 * 24));

                document.getElementById('resCreated').innerText = date.toLocaleString('ar-SA');
                document.getElementById('resAge').innerText = ageDays + " يوم";
                document.getElementById('resId').innerText = id;

                // محاولة جلب المعلومات الحية من الديسكورد
                const response = await fetch(`https://discordlookup.mesalytic.moe/v1/user/${id}`);
                const data = await response.json();

                if(data.id) {
                    document.getElementById('resName').innerText = data.global_name || data.username;
                    document.getElementById('resTag').innerText = "@" + data.username;
                    document.getElementById('resGlobal').innerText = data.global_name || "لا يوجد";
                    document.getElementById('pfp').src = data.avatar.link;
                    document.getElementById('resType').innerText = data.bot ? "بوت (Bot)" : "مستخدم (User)";
                    
                    if(data.banner.link) {
                        document.getElementById('bannerImg').style.background = `url(${data.banner.link}) center/cover`;
                    }

                    // عرض الشارات
                    const badgeBox = document.getElementById('resBadges');
                    badgeBox.innerHTML = '';
                    if(data.badges && data.badges.length > 0) {
                        data.badges.forEach(b => {
                            badgeBox.innerHTML += `<span class="badge-tag">${b.id.replace(/_/g, ' ')}</span>`;
                        });
                    }
                } else {
                    // إذا لم تتوفر البيانات الكاملة نكتفي بما استخرجه السستم
                    document.getElementById('resName').innerText = "Account Found";
                    document.getElementById('resTag').innerText = "معلومات البروفايل مخفية";
                    document.getElementById('resGlobal').innerText = "غير متوفر";
                }

                panel.style.display = 'block';

            } catch (err) {
                // في حال فشل الـ API يعرض السستم المعلومات الرياضية فقط
                document.getElementById('resName').innerText = "System Extraction";
                document.getElementById('resTag').innerText = "تم استخراج البيانات من الآيدي مباشرة";
                panel.style.display = 'block';
            }
        }
    </script>
</body>
</html>
