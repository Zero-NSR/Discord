<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Tracker | Redz Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --d-blurple: #5865F2; --d-green: #23a559; --d-black: #111214;
            --d-card: #1e1f22; --text: #f2f3f5; --muted: #b5bac1;
        }
        body { background-color: var(--d-black); color: var(--text); font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: var(--d-card); width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); overflow: hidden; border: 1px solid #2b2d31; position: relative; }
        .banner { height: 100px; background: var(--d-blurple); background-size: cover; background-position: center; }
        .p-body { padding: 16px; position: relative; }
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 6px solid var(--d-card); position: absolute; top: -50px; right: 15px; background: #313338; }
        .search-area { margin-top: 45px; text-align: right; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0a0a0a; color: white; margin-bottom: 10px; box-sizing: border-box; text-align: center; font-size: 16px; outline: none; }
        input:focus { border-color: var(--d-blurple); }
        .btn { width: 100%; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-search { background: var(--d-blurple); color: white; }
        .btn-join { background: var(--d-green); color: white; margin-top: 20px; text-decoration: none; }
        
        #results { display: none; margin-top: 25px; text-align: right; border-top: 1px solid #333; padding-top: 15px; }
        .u-name { font-size: 22px; font-weight: bold; display: block; color: white; }
        .u-tag { color: var(--muted); font-size: 14px; margin-bottom: 15px; display: block; }
        .info-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .info-item { background: #2b2d31; padding: 10px; border-radius: 8px; font-size: 13px; border-right: 4px solid var(--d-blurple); }
        .label { color: var(--muted); font-size: 10px; font-weight: bold; text-transform: uppercase; display: block; }
        .val { color: white; margin-top: 3px; display: block; }
        .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .badge { background: #111214; padding: 4px 8px; border-radius: 4px; font-size: 10px; color: var(--muted); border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <div id="uBanner" class="banner"></div>
        <div class="p-body">
            <img id="uAvatar" class="avatar" src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png">
            
            <div class="search-area">
                <input type="text" id="targetId" placeholder="ضع الآيدي (ID) هنا..." autocomplete="off">
                <button class="btn btn-search" onclick="fetchData()">
                    <i class="fas fa-bolt"></i> فحص الحساب
                </button>

                <div id="results">
                    <span id="resName" class="u-name"></span>
                    <span id="resTag" class="u-tag"></span>
                    <div id="resBadges" class="badges"></div>

                    <div class="info-grid">
                        <div class="info-item"><span class="label">تاريخ إنشاء الحساب</span><span id="resCreated" class="val"></span></div>
                        <div class="info-item"><span class="label">آيدي الحساب (ID)</span><span id="resId" class="val"></span></div>
                        <div class="info-item"><span class="label">نوع المستخدم</span><span id="resType" class="val"></span></div>
                    </div>
                </div>
            </div>

            <a href="https://discord.gg/WmshaF5szk" class="btn btn-join" target="_blank">
                <i class="fab fa-discord"></i> سيرفر Redz Hub
            </a>
        </div>
    </div>

    <script>
        async function fetchData() {
            const id = document.getElementById('targetId').value.trim();
            if(!id || isNaN(id)) return alert("يرجى إدخال آيدي صحيح (أرقام فقط)");

            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = 'none';

            try {
                // استخدام مصدر بيانات ثابت
                const response = await fetch(`https://discordlookup.mesalytic.moe/v1/user/${id}`);
                
                if(!response.ok) throw new Error();

                const data = await response.json();

                // 1. تحديث الصور
                document.getElementById('uAvatar').src = data.avatar.link;
                if(data.banner.link) {
                    document.getElementById('uBanner').style.backgroundImage = `url(${data.banner.link})`;
                } else {
                    document.getElementById('uBanner').style.backgroundImage = 'none';
                    document.getElementById('uBanner').style.backgroundColor = data.banner.color || '#5865F2';
                }

                // 2. المعلومات الأساسية
                document.getElementById('resName').innerText = data.global_name || data.username;
                document.getElementById('resTag').innerText = "@" + data.username;
                document.getElementById('resId').innerText = data.id;
                document.getElementById('resType').innerText = data.bot ? "بوت (Bot)" : "إنسان (User)";

                // 3. حساب التاريخ (دقيق 100% من الآيدي)
                const createdDate = new Date(Number((BigInt(id) >> 22n) + 1420070400000n));
                document.getElementById('resCreated').innerText = createdDate.toLocaleString('ar-SA', { 
                    dateStyle: 'full', timeStyle: 'short' 
                });

                // 4. الشارات
                const badgeBox = document.getElementById('resBadges');
                badgeBox.innerHTML = '';
                if(data.badges && data.badges.length > 0) {
                    data.badges.forEach(b => {
                        badgeBox.innerHTML += `<span class="badge"><i class="fas fa-check-circle"></i> ${b.id.replace(/_/g, ' ')}</span>`;
                    });
                } else {
                    badgeBox.innerHTML = '<span class="badge">لا توجد شارات عامة</span>';
                }

                resultsDiv.style.display = 'block';

            } catch (err) {
                alert("تعذر جلب البيانات. تأكد أن الآيدي صحيح وأن الحساب ليس مخفياً تماماً.");
            }
        }
    </script>
</body>
</html>
